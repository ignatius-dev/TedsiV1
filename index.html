<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tedsi</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<style>
  :root {
    --navy:   #0d1b2a;
    --teal:   #1b6ca8;
    --blue:   #2196f3;
    --sky:    #e8f4fd;
    --white:  #ffffff;
    --mid:    #5b8db8;
    --soft:   #c9dff0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* ---- background dots ---- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(33,150,243,.08) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  /* ---- card ---- */
  .card {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.09);
    backdrop-filter: blur(16px);
    border-radius: 28px;
    padding: 40px 32px 36px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    box-shadow: 0 32px 80px rgba(0,0,0,.45);
    animation: rise .6s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes rise {
    from { opacity:0; transform: translateY(28px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ---- icon ---- */
  .app-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--blue), var(--teal));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(33,150,243,.35);
  }

  .app-icon svg { width: 40px; height: 40px; }

  /* ---- title ---- */
  .title {
    color: var(--white);
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
    text-align: center;
  }

  .subtitle {
    color: var(--mid);
    font-size: 13px;
    font-weight: 300;
    text-align: center;
    margin-top: -16px;
  }

  /* ---- upload zone ---- */
  .upload-zone {
    width: 100%;
    border: 2px dashed rgba(33,150,243,.35);
    border-radius: 20px;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color .25s, background .25s;
    position: relative;
    overflow: hidden;
    background: rgba(33,150,243,.04);
  }

  .upload-zone:hover {
    border-color: var(--blue);
    background: rgba(33,150,243,.09);
  }

  .upload-zone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon { color: var(--mid); font-size: 44px; line-height: 1; }

  .upload-text {
    color: var(--soft);
    font-size: 14px;
    font-weight: 500;
    text-align: center;
  }

  .upload-hint {
    color: var(--mid);
    font-size: 12px;
    font-weight: 300;
  }

  /* preview image */
  #preview {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    border-radius: 18px;
    display: none;
  }

  /* ---- button ---- */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--blue), var(--teal));
    color: white;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
    box-shadow: 0 8px 24px rgba(33,150,243,.3);
    display: none;
  }

  .btn:hover  { opacity: .88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

Ignatius, [5/14/2026 7:28 AM]
/* ---- result ---- */
  .result-box {
    width: 100%;
    background: rgba(33,150,243,.1);
    border: 1px solid rgba(33,150,243,.25);
    border-radius: 16px;
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 14px;
    animation: pop .4s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes pop {
    from { opacity:0; transform: scale(.95); }
    to   { opacity:1; transform: scale(1); }
  }

  .result-name {
    color: var(--white);
    font-size: 26px;
    font-weight: 900;
    text-align: center;
  }

  .result-emoji {
    font-size: 40px;
    text-align: center;
  }

  .bars { display: flex; flex-direction: column; gap: 8px; }

  .bar-row { display: flex; flex-direction: column; gap: 4px; }

  .bar-label {
    display: flex;
    justify-content: space-between;
    color: var(--soft);
    font-size: 12px;
  }

  .bar-track {
    height: 7px;
    background: rgba(255,255,255,.08);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--teal), var(--blue));
    transition: width .7s cubic-bezier(.22,1,.36,1);
    width: 0;
  }

  /* ---- loading ---- */
  .loading {
    color: var(--mid);
    font-size: 13px;
    text-align: center;
    display: none;
  }

  .spinner {
    width: 22px; height: 22px;
    border: 2px solid rgba(33,150,243,.2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- model status ---- */
  .status {
    color: var(--mid);
    font-size: 11px;
    text-align: center;
  }

  .status.ready { color: #4caf50; }
  .status.error { color: #f44336; }
</style>
</head>
<body>

<div class="card">

  <!-- آیکون -->
  <div class="app-icon">
    <!-- پنجه سگ/گربه -->
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- پد اصلی -->
      <ellipse cx="32" cy="42" rx="13" ry="10" fill="white"/>
      <!-- انگشت وسط چپ -->
      <ellipse cx="20" cy="28" rx="5.5" ry="7" fill="white"/>
      <!-- انگشت وسط راست -->
      <ellipse cx="44" cy="28" rx="5.5" ry="7" fill="white"/>
      <!-- انگشت کنار چپ -->
      <ellipse cx="12" cy="34" rx="4.5" ry="6" fill="white"/>
      <!-- انگشت کنار راست -->
      <ellipse cx="52" cy="34" rx="4.5" ry="6" fill="white"/>
    </svg>
  </div>

  <div>
    <div class="title">TEDSI</div>
    <div class="subtitle">تشخیص پت با هوش مصنوعی</div>
  </div>

  <!-- zone آپلود -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" accept="image/*" id="fileInput" onchange="handleFile(event)">
    <img id="preview" alt="preview">
    <div id="uploadPlaceholder">
      <div class="upload-icon">🐾</div>
      <div class="upload-text">عکس پتت رو انتخاب کن</div>
      <div class="upload-hint">از گالری یا دوربین</div>
    </div>
  </div>

  <!-- دکمه -->
  <button class="btn" id="predictBtn" onclick="predict()">تشخیص بده ✨</button>

  <!-- loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    داره فکر میکنه...
  </div>

  <!-- نتیجه -->
  <div class="result-box" id="resultBox">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-name" id="resultName"></div>
    <div class="bars" id="barsContainer"></div>
  </div>

  <div class="status" id="modelStatus">در حال لود مدل...</div>
</div>

<script>
const LABELS = ['lucy', 'pastil', 'tedi'];
const EMOJIS = { lucy: '🐶', pastil: '🐱', tedi: '🐶' };
const NAMES_FA = { lucy: 'لوسی', pastil: 'پاستیل', tedi: 'تدی' };

let model = null;
let selectedImage = null;

// لود مدل
async function loadModel() {
  try {
    model = await tf.loadLayersModel('tfjs_model/model.json');
    document.getElementById('modelStatus').textContent = '✅ مدل آماده‌ست';

Ignatius, [5/14/2026 7:28 AM]
document.getElementById('modelStatus').className = 'status ready';
  } catch(e) {
    document.getElementById('modelStatus').textContent = '❌ مدل لود نشد — مسیر tfjs_model رو چک کن';
    document.getElementById('modelStatus').className = 'status error';
  }
}

// هندل فایل
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    const preview = document.getElementById('preview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
    document.getElementById('uploadPlaceholder').style.display = 'none';
    document.getElementById('predictBtn').style.display = 'block';
    document.getElementById('resultBox').style.display = 'none';
    selectedImage = preview;
  };
  reader.readAsDataURL(file);
}

// پیش‌بینی
async function predict() {
  if (!model || !selectedImage) return;

  document.getElementById('predictBtn').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('resultBox').style.display = 'none';

  await new Promise(r => setTimeout(r, 50));

  try {
    const tensor = tf.browser.fromPixels(selectedImage)
      .resizeBilinear([224, 224])
      .toFloat()
      .div(255.0)
      .expandDims(0);

    const predictions = await model.predict(tensor).data();
    tensor.dispose();

    const maxIdx = predictions.indexOf(Math.max(...predictions));
    const name = LABELS[maxIdx];

    // نمایش نتیجه
    document.getElementById('resultEmoji').textContent = EMOJIS[name];
    document.getElementById('resultName').textContent = NAMES_FA[name];

    // بارها
    const barsContainer = document.getElementById('barsContainer');
    barsContainer.innerHTML = '';
    LABELS.forEach((label, i) => {
      const pct = (predictions[i] * 100).toFixed(1);
      barsContainer.innerHTML += 
        <div class="bar-row">
          <div class="bar-label">
            <span>${NAMES_FA[label]}</span>
            <span>${pct}٪</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" id="bar-${i}" style="width:0%"></div>
          </div>
        </div>;
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('resultBox').style.display = 'flex';
    document.getElementById('predictBtn').style.display = 'block';
    document.getElementById('predictBtn').textContent = 'دوباره امتحان کن';

    // انیمیشن بارها
    setTimeout(() => {
      LABELS.forEach((_, i) => {
        document.getElementById(bar-${i}).style.width = (predictions[i]*100) + '%';
      });
    }, 100);

  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('predictBtn').style.display = 'block';
    alert('خطا در پیش‌بینی: ' + err.message);
  }
}

loadModel();
</script>
</body>
</html>
