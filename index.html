<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tedsi</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<style>
:root{--navy:#0d1b2a;--teal:#1b6ca8;--blue:#2196f3;--white:#ffffff;--mid:#5b8db8;--soft:#c9dff0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Vazirmatn',sans-serif;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(33,150,243,.08) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:28px;padding:40px 32px 36px;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:20px;box-shadow:0 32px 80px rgba(0,0,0,.45);}
.app-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--blue),var(--teal));border-radius:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(33,150,243,.35);}
.app-icon svg{width:40px;height:40px;}
.title{color:var(--white);font-size:28px;font-weight:900;letter-spacing:2px;text-align:center;}
.subtitle{color:var(--mid);font-size:13px;text-align:center;margin-top:-12px;}
.upload-zone{width:100%;border:2px dashed rgba(33,150,243,.35);border-radius:20px;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;position:relative;overflow:hidden;background:rgba(33,150,243,.04);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:44px;}
.upload-text{color:var(--soft);font-size:14px;font-weight:500;}
.upload-hint{color:var(--mid);font-size:12px;}
#preview{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:18px;display:none;}
.btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--teal));color:white;font-family:'Vazirmatn',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(33,150,243,.3);display:none;}
.result-box{width:100%;background:rgba(33,150,243,.1);border:1px solid rgba(33,150,243,.25);border-radius:16px;padding:20px;display:none;flex-direction:column;gap:12px;}
.result-emoji{font-size:40px;text-align:center;}
.result-name{color:var(--white);font-size:26px;font-weight:900;text-align:center;}
.bar-row{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.bar-label{display:flex;justify-content:space-between;color:var(--soft);font-size:12px;}
.bar-track{height:7px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .7s ease;width:0%;}
.status{color:var(--mid);font-size:11px;text-align:center;}
.status.ready{color:#4caf50;}
.status.error{color:#f44336;}
.spinner{width:22px;height:22px;border:2px solid rgba(33,150,243,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div class="app-icon">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="32" cy="42" rx="13" ry="10" fill="white"/>
      <ellipse cx="20" cy="28" rx="5.5" ry="7" fill="white"/>
      <ellipse cx="44" cy="28" rx="5.5" ry="7" fill="white"/>
      <ellipse cx="12" cy="34" rx="4.5" ry="6" fill="white"/>
      <ellipse cx="52" cy="34" rx="4.5" ry="6" fill="white"/>
    </svg>
  </div>
  <div class="title">TEDSI</div>
  <div class="subtitle">تشخیص پت با هوش مصنوعی</div>
  <div class="upload-zone">
    <input type="file" accept="image/*" id="fileInput" onchange="handleFile(event)">
    <img id="preview" alt="preview">
    <div id="placeholder">
      <div class="upload-icon">🐾</div>
      <div class="upload-text">عکس پتت رو انتخاب کن</div>
      <div class="upload-hint">از گالری یا دوربین</div>
    </div>
  </div>
  <button class="btn" id="predictBtn" onclick="predict()">تشخیص بده</button>
  <div class="spinner" id="spinner"></div>
  <div class="result-box" id="resultBox">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-name" id="resultName"></div>
    <div id="barsContainer"></div>
  </div>
  <div class="status" id="modelStatus">در حال لود مدل...</div>
</div>

<script>
var LABELS = ['lucy', 'pastil', 'tedi'];
var EMOJIS = {'lucy':'🐶','pastil':'🐱','tedi':'🐶'};
var NAMES = {'lucy':'لوسی','pastil':'پاستیل','tedi':'تدی'};
var model = null;

async function loadModel() {
  var el = document.getElementById('modelStatus');
  try {
    var base = 'https://ignatius-dev.github.io/TedsiV1/';
    if (base[base.length-1] !== '/') base += '/';
    model = await tf.loadLayersModel(base + 'tfjs_model/model.json');
    el.textContent = 'مدل آماده است';
    el.className = 'status ready';
  } catch(e) {
    el.textContent = 'خطا در لود مدل: ' + e.message;
    el.className = 'status error';
  }
}

function handleFile(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var p = document.getElementById('preview');
    p.src = ev.target.result;
    p.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('predictBtn').style.display = 'block';
    document.getElementById('resultBox').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function predict() {
  if (!model) { alert('مدل هنوز لود نشده!'); return; }
  var preview = document.getElementById('preview');
  document.getElementById('predictBtn').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('resultBox').style.display = 'none';
  await new Promise(function(r){ setTimeout(r,50); });
  try {
    var tensor = tf.browser.fromPixels(preview)
      .resizeBilinear([224,224])
      .toFloat().div(255.0).expandDims(0);
    var out = model.predict(tensor);
    var preds = await out.data();
    tensor.dispose(); out.dispose();
    var maxIdx = 0;
    for (var i=1; i<preds.length; i++) { if(preds[i]>preds[maxIdx]) maxIdx=i; }
    var name = LABELS[maxIdx];
    document.getElementById('resultEmoji').textContent = EMOJIS[name];
    document.getElementById('resultName').textContent = NAMES[name];
    var html = '';
    for (var i=0; i<LABELS.length; i++) {
      var pct = (preds[i]*100).toFixed(1);
      html += '<div class="bar-row"><div class="bar-label"><span>'+NAMES[LABELS[i]]+'</span><span>'+pct+'%</span></div><div class="bar-track"><div class="bar-fill" id="bar'+i+'"></div></div></div>';
    }
    document.getElementById('barsContainer').innerHTML = html;
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('resultBox').style.display = 'flex';
    document.getElementById('predictBtn').style.display = 'block';
    document.getElementById('predictBtn').textContent = 'دوباره امتحان کن';
    setTimeout(function(){
      for(var i=0;i<LABELS.length;i++){
        document.getElementById('bar'+i).style.width=(preds[i]*100)+'%';
      }
    },100);
  } catch(err) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('predictBtn').style.display = 'block';
    document.getElementById('modelStatus').textContent = 'خطا: '+err.message;
    document.getElementById('modelStatus').className = 'status error';
  }
}

loadModel();
</script>
</body>
</html>
